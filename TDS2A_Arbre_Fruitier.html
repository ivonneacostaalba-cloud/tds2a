<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1B5E20">
<title>TDS2A — Arbre Fruitier</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gd:#1B5E20;--gm:#388E3C;--gp:#E8F5E9;--gl:#C8E6C9;
  --rd:#C62828;--rdl:#FFEBEE;--am:#E65100;--aml:#FFF3E0;
  --bg:#EEF1EC;--card:#fff;--bdr:#DDE3DA;
  --txt:#1C1F1A;--mut:#5A6358;--hint:#8A9488;
  --r:12px;--ri:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding-bottom:92px}
.app{max-width:560px;margin:0 auto}

/* TOP BAR */
.top{background:var(--gd);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.top-info{flex:1}
.top-info h1{font-size:13px;font-weight:600;line-height:1.3}
.top-info p{font-size:10px;opacity:.7;margin-top:1px}
.tbtn{background:rgba(255,255,255,.18);border:none;color:#fff;border-radius:7px;padding:6px 11px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.tbtn:active{background:rgba(255,255,255,.32)}
.tbtn.sv{background:rgba(255,255,255,.28)}

/* PROGRESS */
.prog{height:3px;background:rgba(255,255,255,.2)}
.pf{height:100%;background:#fff;transition:width .35s}

/* TABS */
.tabs{display:flex;gap:3px;overflow-x:auto;padding:8px 12px 7px;background:var(--gd);scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:5px 10px;border-radius:18px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:rgba(255,255,255,.14);color:rgba(255,255,255,.6);white-space:nowrap;transition:all .15s}
.tab.active{background:#fff;color:var(--gd)}
.tab.done{background:rgba(255,255,255,.28);color:#fff}

/* CARDS */
.cnt{padding:12px 14px}
.card{background:var(--card);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;border:1px solid var(--bdr);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ct{font-size:10px;font-weight:700;color:var(--mut);margin-bottom:13px;text-transform:uppercase;letter-spacing:.06em}
.ct-desc{font-size:11px;color:var(--mut);font-style:italic;font-weight:400;margin-top:4px;margin-bottom:12px;line-height:1.5;padding:8px 10px;background:var(--bg);border-radius:6px;border-left:3px solid var(--gm)}

/* FIELDS */
.f{margin-bottom:13px}
.f:last-child{margin-bottom:0}
.f>label{display:block;font-size:13px;color:var(--txt);margin-bottom:6px;font-weight:500;line-height:1.4}
.f>label .req{color:var(--rd);margin-left:3px}
.f>label .nsp-note{font-size:11px;color:var(--hint);font-weight:400;display:block;margin-top:2px}
input[type=text],input[type=number],input[type=date],select,textarea{
  width:100%;font-size:15px;padding:11px 13px;border-radius:var(--ri);
  border:1.5px solid var(--bdr);background:#fff;color:var(--txt);
  -webkit-appearance:none;font-family:inherit;transition:border-color .15s;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gm);box-shadow:0 0 0 3px rgba(56,142,60,.12)}
textarea{min-height:76px;resize:vertical;line-height:1.5}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* RADIO BUTTONS */
.rg{display:flex;gap:7px;flex-wrap:wrap;margin-top:2px}
.rb{padding:9px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid var(--bdr);background:#fafafa;color:var(--txt);transition:all .15s;line-height:1}
.rb.on{background:var(--gp);border-color:var(--gm);color:var(--gd);font-weight:600}
.rb:active{transform:scale(.97)}

/* CHECKBOXES (multi-select) */
.cg{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}
.cb-btn{padding:8px 12px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--bdr);background:#fafafa;color:var(--txt);transition:all .15s;display:flex;align-items:center;gap:6px}
.cb-btn.on{background:var(--gp);border-color:var(--gm);color:var(--gd);font-weight:600}

/* INFO BOXES */
.info{background:var(--gp);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--mut);margin-bottom:12px;display:flex;gap:8px;border-left:3px solid var(--gm);line-height:1.5}
.info-warn{background:#FFF8E1;border-left-color:#F57F17;color:#5D4037}
.info-pain{background:var(--aml);border-left-color:var(--am);color:#BF360C}
.info-ref{background:#EDE7F6;border-left-color:#6A1B9A;color:#4A148C;font-style:italic}

/* SECTION LABELS */
.slbl{font-size:10px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.06em;margin:14px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--bdr)}

/* OPTIONAL SECTION */
.opt-toggle{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:8px;background:var(--bg);border:1.5px dashed var(--bdr);cursor:pointer;font-size:12px;font-weight:600;color:var(--mut);margin:10px 0 0;transition:all .15s}
.opt-toggle:active{background:var(--gp)}
.opt-section{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--bdr)}
.opt-section.open{display:block}

/* PRODUCT BLOCKS */
.prod-block{border:1px solid var(--bdr);border-radius:9px;padding:12px 14px;margin-bottom:10px;background:#FAFBFA}
.prod-title{font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.prod-tabs{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.prod-tab{padding:5px 12px;border-radius:14px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--bdr);background:#fff;color:var(--mut);transition:all .15s}
.prod-tab.active{background:var(--gd);color:#fff;border-color:var(--gd)}

/* CALENDAR */
.cal-ops{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}
.cal-op{padding:5px 10px;border-radius:14px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid;transition:all .15s;opacity:.5}
.cal-op.sel{opacity:1}
.cal-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px}
.cal-m{padding:8px 3px;font-size:11px;font-weight:600;text-align:center;border-radius:6px;cursor:pointer;border:1.5px solid var(--bdr);background:#fafafa;color:var(--mut);transition:all .15s;line-height:1.3}

/* RANGE */
.range-wrap{display:flex;align-items:center;gap:10px}
.range-wrap input[type=range]{flex:1;accent-color:var(--gm);height:6px}
.range-val{font-size:14px;font-weight:700;color:var(--gd);min-width:40px;text-align:right}

/* METRICS (synthese) */
.met-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.met{background:var(--bg);border-radius:9px;padding:11px 10px;text-align:center}
.met-l{font-size:10px;color:var(--mut);margin-bottom:4px}
.met-v{font-size:20px;font-weight:700;color:var(--gd)}
.met-u{font-size:10px;color:var(--hint);margin-top:1px}

/* SYNTH ROWS */
.sr{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--bg);font-size:13px;gap:12px}
.sr:last-child{border-bottom:none}
.sr-l{color:var(--mut);flex-shrink:0;max-width:55%}
.sr-v{font-weight:600;text-align:right}

/* NAV BAR */
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--bdr);padding:10px 14px;display:flex;gap:9px;z-index:100;box-shadow:0 -2px 8px rgba(0,0,0,.06)}
.nav-inner{max-width:560px;margin:0 auto;display:flex;gap:9px;width:100%}
.nbk{flex:0 0 auto;padding:12px 18px;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;border:1.5px solid var(--bdr);background:#fafafa;color:var(--txt)}
.nnx{flex:1;padding:12px;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer;border:none;background:var(--gd);color:#fff}
.nsv{flex:1;padding:12px;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer;border:none;background:#4E342E;color:#fff}

/* FICHES LIST */
.fc{background:var(--card);border-radius:var(--r);padding:14px 16px;margin-bottom:9px;border:1px solid var(--bdr);cursor:pointer;transition:box-shadow .15s}
.fc:active{box-shadow:0 2px 8px rgba(0,0,0,.1)}
.fi{font-weight:700;font-size:15px;color:var(--gd);margin-bottom:3px}
.fe{font-size:12px;color:var(--mut);margin-bottom:8px}
.ft{display:flex;gap:5px;flex-wrap:wrap}
.badge{display:inline-block;padding:3px 9px;border-radius:10px;font-size:11px;font-weight:600;background:var(--gp);color:var(--gd)}
.badge-n{background:#f0f0f0;color:#555}
.badge-a{background:var(--aml);color:var(--am)}
.del-btn{background:transparent;border:none;color:#ccc;font-size:20px;cursor:pointer;padding:2px 6px;flex-shrink:0;line-height:1}
.empty{text-align:center;padding:52px 24px}
.empty-icon{font-size:56px;margin-bottom:16px}
.empty-title{font-size:18px;font-weight:700;color:var(--gd);margin-bottom:8px}
.empty-sub{font-size:13px;color:var(--hint);margin-bottom:30px;line-height:1.5}

/* EXPORT BUTTON */
.export-btn{width:100%;padding:13px;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer;border:none;background:#4E342E;color:#fff;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px}
.new-btn{width:100%;padding:13px;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer;border:none;background:var(--gd);color:#fff;margin-bottom:12px}

/* PAIN SECTION */
.pain-blk{background:var(--aml);border-radius:9px;padding:12px 14px;margin-top:8px;border:1.5px solid #FFCC80}
.pain-ttl{font-size:10px;font-weight:700;color:var(--am);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
</style>

</head>
<body>
<div class="app" id="app"></div>

<script>
// ── STORAGE (localStorage pour offline) ──────────────────────────────────────
const STORAGE_KEY = 'tds2a_arbres_v1';
function loadFiches(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');}catch{return[];}}
function saveFiches(f){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(f));return true;}catch{return false;}}

// ── STATE ────────────────────────────────────────────────────────────────────
let fiches=loadFiches();
let view='list';
let cur=null;
let step=0;
let done=new Set();
let calOp='R';
let saveMsg='';

// ── DOM HELPERS ──────────────────────────────────────────────────────────────
function h(tag,attrs={},...ch){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==='class')el.className=v;
    else if(k.startsWith('on'))el.addEventListener(k.slice(2),v);
    else el.setAttribute(k,v);
  }
  for(const c of ch){
    if(c==null||c===false)continue;
    if(typeof c==='string')el.appendChild(document.createTextNode(c));
    else el.appendChild(c);
  }
  return el;
}

function inp(val,key,attrs={}){
  const e=h('input',{value:val||'',...attrs});
  e.oninput=ev=>cur[key]=ev.target.value;
  return e;
}

function selEl(val,key,opts,ph='— choisir —'){
  const e=h('select');
  e.appendChild(h('option',{value:''},ph));
  opts.forEach(o=>{
    const opt=h('option',{value:typeof o==='object'?o.v:o},typeof o==='object'?o.l:o);
    e.appendChild(opt);
  });
  e.value=val||'';
  e.onchange=ev=>{cur[key]=ev.target.value;render();};
  return e;
}

function radio(val,key,opts,onchange){
  const w=h('div',{class:'rg'});
  opts.forEach(o=>{
    const b=h('button',{class:'rb'+(val===o?' on':'')},o);
    b.onclick=()=>{cur[key]=o;if(onchange)onchange(o);render();};
    w.appendChild(b);
  });
  return w;
}

function multisel(vals,key,opts){
  const w=h('div',{class:'cg'});
  opts.forEach(o=>{
    const on=(vals||[]).includes(o);
    const b=h('button',{class:'cb-btn'+(on?' on':'')},on?'✓ ':' ',o);
    b.onclick=()=>{
      const arr=cur[key]||[];
      cur[key]=arr.includes(o)?arr.filter(x=>x!==o):[...arr,o];
      render();
    };
    w.appendChild(b);
  });
  return w;
}

function ta(val,key,ph=''){
  const e=h('textarea',{placeholder:ph});
  e.value=val||'';
  e.oninput=ev=>cur[key]=ev.target.value;
  return e;
}

function fld(lbl,req,child,note=''){
  const lEl=h('label',{},lbl,req?h('span',{class:'req'},'★'):'');
  if(note)lEl.appendChild(h('span',{class:'nsp-note'},note));
  return h('div',{class:'f'},lEl,child);
}

function card(title,desc,...ch){
  const parts=[h('div',{class:'ct'},title)];
  if(desc)parts.push(h('div',{class:'ct-desc'},desc));
  parts.push(...ch.filter(Boolean));
  return h('div',{class:'card'},...parts);
}

function infobox(msg,type=''){
  return h('div',{class:'info'+(type?' info-'+type:'')},h('span',{},'ℹ️'),h('span',{},msg));
}

function r2(...ch){const d=h('div',{class:'r2'});ch.filter(Boolean).forEach(c=>d.appendChild(c));return d;}
function r3(...ch){const d=h('div',{class:'r3'});ch.filter(Boolean).forEach(c=>d.appendChild(c));return d;}
function slbl(t){return h('div',{class:'slbl'},t);}

function optSection(btnLabel,id,...ch){
  const sec=h('div',{class:'opt-section',id:'opt-'+id},...ch.filter(Boolean));
  const btn=h('div',{class:'opt-toggle',onclick:()=>{
    const open=sec.classList.toggle('open');
    btn.querySelector('.arrow').textContent=open?'▲':'▼';
  }},h('span',{class:'arrow'},'▼'),' '+btnLabel);
  return h('div',{},btn,sec);
}

function rng(lbl,key,val,req=false){
  const sp=h('span',{class:'range-val'},val+'%');
  const i=h('input',{type:'range',min:'0',max:'100',step:'5',value:String(val)});
  i.oninput=e=>{cur[key]=parseInt(e.target.value);sp.textContent=e.target.value+'%';};
  return fld(lbl,req,h('div',{class:'range-wrap'},i,sp));
}

function prodBlock(label,idx,fields){
  return h('div',{class:'prod-block'},
    h('div',{class:'prod-title'},label+' '+idx),
    ...fields.filter(Boolean)
  );
}

// AUTRE field: show text input when "Autre" selected
function selWithAutre(val,autreVal,key,autreKey,opts){
  const s=selEl(val,key,[...opts,'Autre']);
  const inp_autre=h('input',{type:'text',value:autreVal||'',placeholder:'Préciser...',style:'margin-top:8px;display:'+(val==='Autre'?'block':'none')});
  inp_autre.oninput=e=>cur[autreKey]=e.target.value;
  const wrap=h('div',{},s,inp_autre);
  s.addEventListener('change',()=>{inp_autre.style.display=s.value==='Autre'?'block':'none';});
  return wrap;
}

function radioWithAutre(val,autreVal,key,autreKey,opts){
  const w=h('div',{});
  const rg=h('div',{class:'rg'});
  [...opts,'Autre'].forEach(o=>{
    const b=h('button',{class:'rb'+(val===o?' on':'')},o);
    b.onclick=()=>{cur[key]=o;render();};
    rg.appendChild(b);
  });
  const inp_autre=h('input',{type:'text',value:autreVal||'',placeholder:'Préciser...',style:'margin-top:8px;display:'+(val==='Autre'?'block':'none')});
  inp_autre.oninput=e=>cur[autreKey]=e.target.value;
  w.appendChild(rg);
  w.appendChild(inp_autre);
  rg.addEventListener('click',()=>{
    setTimeout(()=>{inp_autre.style.display=cur[key]==='Autre'?'block':'none';},50);
  });
  return w;
}

// ── CALENDAR ────────────────────────────────────────────────────────────────
const OPS=[
  {k:'R',l:'Récolte',c:'#E65100',bg:'#FFF3E0'},
  {k:'F',l:'Fertilisation',c:'#388E3C',bg:'#E8F5E9'},
  {k:'T',l:'Taille',c:'#1565C0',bg:'#E3F2FD'},
  {k:'D',l:'Désherbage',c:'#4E342E',bg:'#EFEBE9'},
  {k:'Ph',l:'Traitement phyto',c:'#C62828',bg:'#FFEBEE'},
  {k:'Fl',l:'Floraison',c:'#6A1B9A',bg:'#F3E5F5'},
];
const MOIS=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];

function buildCal(f){
  const opRow=h('div',{class:'cal-ops'});
  OPS.forEach(op=>{
    const sel=calOp===op.k;
    const t=h('span',{class:'cal-op'+(sel?' sel':'')},op.l);
    t.style.cssText='border-color:'+op.c+';background:'+(sel?op.bg:'#fafafa')+';color:'+(sel?op.c:'#999');
    t.onclick=()=>{calOp=op.k;render();};
    opRow.appendChild(t);
  });
  const grid=h('div',{class:'cal-grid'});
  MOIS.forEach((m,i)=>{
    const op=f.cal&&f.cal[i];
    const od=OPS.find(o=>o.k===op);
    const b=h('div',{class:'cal-m'},m,op?h('div',{style:'font-size:9px;margin-top:2px'},op):null);
    if(od){b.style.background=od.bg;b.style.borderColor=od.c;b.style.color=od.c;}
    b.onclick=()=>{
      if(!f.cal)f.cal={};
      if(f.cal[i]===calOp)delete f.cal[i];else f.cal[i]=calOp;
      render();
    };
    grid.appendChild(b);
  });
  return h('div',{},opRow,grid);
}

// ── NAVIGATION ───────────────────────────────────────────────────────────────
function today(){return new Date().toISOString().split('T')[0];}

function nextStep(){done.add(step);step++;render();window.scrollTo(0,0);}
function prevStep(){step--;render();window.scrollTo(0,0);}

function saveCur(){
  if(!cur)return;
  const u={...cur,saved_at:new Date().toISOString()};
  const i=fiches.findIndex(f=>f.id===u.id);
  if(i>=0)fiches[i]=u;else fiches.push(u);
  const ok=saveFiches(fiches);
  saveMsg=ok?'✓ Sauvegardée':'⚠ Erreur';
  cur=u;render();
  setTimeout(()=>{saveMsg='';render();},2200);
}

function openFiche(id){
  const f=fiches.find(x=>x.id===id);
  if(!f)return;
  cur={...f,cal:{...(f.cal||{})},circuits:[...(f.circuits||[])]};
  step=0;done=new Set(STEPS.map((_,i)=>i));view='form';render();
}

function deleteFiche(id){
  if(!confirm('Supprimer cette fiche ?'))return;
  fiches=fiches.filter(f=>f.id!==id);
  saveFiches(fiches);render();
}

function exportAll(){
  const blob=new Blob([JSON.stringify(fiches,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='Arbres_Fruitiers_'+today()+'.json';
  a.click();
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  app.innerHTML='';
  if(view==='list'){renderList(app);}
  else{renderForm(app);}
}

function renderList(app){
  const top=h('div',{class:'top'},
    h('div',{class:'top-info'},
      h('h1',{},'🌳 Arbre Fruitier — TDS2A'),
      h('p',{},'TDS2A Martinique · '+fiches.length+' fiche(s)')
    )
  );
  app.appendChild(top);
  const cnt=h('div',{class:'cnt'});
  if(fiches.length===0){
    cnt.appendChild(h('div',{class:'empty'},
      h('div',{class:'empty-icon'},'🌳'),
      h('div',{class:'empty-title'},'Aucune fiche encore'),
      h('div',{class:'empty-sub'},'Appuyer sur le bouton pour commencer une nouvelle enquête'),
      h('button',{class:'new-btn',onclick:newFiche},'+ Nouvelle fiche')
    ));
  } else {
    cnt.appendChild(h('button',{class:'new-btn',onclick:newFiche},'+ Nouvelle fiche'));
    if(fiches.length>0)cnt.appendChild(h('button',{class:'export-btn',onclick:exportAll},'⬇ Exporter toutes les fiches (JSON)'));
    fiches.slice().reverse().forEach(f=>{
      const fc=h('div',{class:'fc'},
        h('div',{style:'display:flex;justify-content:space-between;align-items:flex-start'},
          h('div',{style:'flex:1',onclick:()=>openFiche(f.id)},
            h('div',{class:'fi'},f.id_enq||'Sans numéro'),
            h('div',{class:'fe'},(f.espece||'Espèce non renseignée').split(' (')[0]),
            h('div',{class:'ft'},
              f.commune?h('span',{class:'badge'},f.commune):null,
              f.stagiaire?h('span',{class:'badge badge-n'},f.stagiaire):null,
              f.date?h('span',{class:'badge badge-n'},f.date):null,
              f.nb_arbres?h('span',{class:'badge'},f.nb_arbres+' arbre(s)'):null,
            )
          ),
          h('button',{class:'del-btn',onclick:e=>{e.stopPropagation();deleteFiche(f.id);}},'×')
        )
      );
      cnt.appendChild(fc);
    });
  }
  app.appendChild(cnt);
}

function renderForm(app){
  const steps=STEPS;
  const top=h('div',{class:'top'},
    h('button',{class:'tbtn',onclick:()=>{view='list';render();}},'← Fiches'),
    h('div',{class:'top-info'},
      h('h1',{},steps[step].l),
      h('p',{},'Étape '+(step+1)+' / '+steps.length+' — '+(cur.id_enq||'nouvelle fiche'))
    ),
    h('button',{class:'tbtn sv',onclick:saveCur},saveMsg||'💾 Sauv.')
  );
  app.appendChild(top);
  app.appendChild(h('div',{class:'prog'},h('div',{class:'pf',style:'width:'+((step+1)/steps.length*100)+'%'})));
  const tabs=h('div',{class:'tabs'});
  steps.forEach((s,i)=>{
    const t=h('div',{class:'tab'+(i===step?' active':done.has(i)?' done':'')},s.ic+' '+s.l);
    t.onclick=()=>{step=i;render();};
    tabs.appendChild(t);
  });
  app.appendChild(tabs);
  const cnt=h('div',{class:'cnt'});
  cnt.appendChild(renderStep());
  // Inject send button on last step (synthese)
  if(step===STEPS.length-1 && cur){setTimeout(()=>injectSendButton(cur),50);}
  app.appendChild(cnt);
  const nav=h('div',{class:'nav'});
  const inner=h('div',{class:'nav-inner'});
  if(step>0)inner.appendChild(h('button',{class:'nbk',onclick:prevStep},'← Retour'));
  if(step<steps.length-1){
    inner.appendChild(h('button',{class:'nnx',onclick:nextStep},'Suivant →'));
  } else {
    inner.appendChild(h('button',{class:'nsv',onclick:()=>{saveCur();view='list';render();}},'✓ Enregistrer la fiche'));
  }
  nav.appendChild(inner);
  app.appendChild(nav);
}

// ── ENVOI GOOGLE SHEETS ──────────────────────────────────────────────────────
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwmhGf3H-A4A9rPbbAbAK6hLAiVXfkf24hbZjZQeF2JKXc9-lmlHqRAUCZkzg58nClkYA/exec";

async function sendToSheets(fiche) {
  const btn = document.getElementById('send-btn');
  const msg = document.getElementById('send-msg');
  if (!btn || !msg) return;
  btn.disabled = true;
  btn.textContent = '⏳ Envoi en cours…';
  msg.textContent = '';
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(fiche)
    });
    btn.textContent = '✓ Envoyé à Google Sheets !';
    btn.style.background = '#2E7D32';
    msg.textContent = '✓ Fiche reçue — ID : ' + (fiche.id_enq || '?');
    msg.style.color = '#2E7D32';
    const idx = fiches.findIndex(f => f.id === fiche.id);
    if (idx >= 0) { fiches[idx].sent_to_sheets = true; saveFiches(fiches); }
  } catch(err) {
    btn.textContent = '⚠ Erreur — réessayer';
    btn.disabled = false;
    btn.style.background = '#C62828';
    msg.textContent = 'Vérifier la connexion internet.';
    msg.style.color = '#C62828';
  }
}

function injectSendButton(fiche) {
  const existing = document.getElementById('send-zone');
  if (existing) existing.remove();
  const zone = document.createElement('div');
  zone.id = 'send-zone';
  zone.style.cssText = 'margin:12px 14px 4px;';
  const btn = document.createElement('button');
  btn.id = 'send-btn';
  const alreadySent = fiche && fiche.sent_to_sheets;
  btn.textContent = alreadySent ? '✓ Déjà envoyé — renvoyer ?' : '📤 Envoyer à Google Sheets';
  btn.style.cssText = 'width:100%;padding:14px;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer;border:none;background:' + (alreadySent ? '#2E7D32' : '#1B5E20') + ';color:#fff;font-family:inherit;margin-bottom:8px;display:block;';
  btn.onclick = () => sendToSheets(fiche);
  const msg = document.createElement('div');
  msg.id = 'send-msg';
  msg.style.cssText = 'font-size:12px;text-align:center;padding:4px;font-weight:500;min-height:18px;';
  if (alreadySent) { msg.textContent = '✓ Cette fiche a déjà été envoyée au Google Sheet.'; msg.style.color = '#2E7D32'; }
  zone.appendChild(btn);
  zone.appendChild(msg);
  const nav = document.querySelector('.nav');
  if (nav) nav.parentNode.insertBefore(zone, nav);
}

// Helpers for product arrays
function inpP(obj,key,attrs={},idx,arrKey){
  const e=h('input',{value:obj[key]||'',...attrs});
  e.oninput=ev=>{cur[arrKey][idx][key]=ev.target.value;};
  return e;
}
function selElP(obj,key,opts,ph='— choisir —',idx,arrKey){
  const e=h('select');
  e.appendChild(h('option',{value:''},ph||'— choisir —'));
  opts.forEach(o=>e.appendChild(h('option',{value:o},o)));
  e.value=obj[key]||'';
  e.onchange=ev=>{cur[arrKey][idx][key]=ev.target.value;render();};
  return e;
}
function selWithAutreP(obj,key,autreKey,opts,idx,arrKey){
  const s=selElP(obj,key,[...opts,'Autre'],'— choisir —',idx,arrKey);
  const ia=h('input',{type:'text',value:obj[autreKey]||'',placeholder:'Préciser...',style:'margin-top:8px;display:'+(obj[key]==='Autre'?'block':'none')});
  ia.oninput=e=>cur[arrKey][idx][autreKey]=e.target.value;
  s.addEventListener('change',()=>{ia.style.display=s.value==='Autre'?'block':'none';});
  return h('div',{},s,ia);
}


function renderStep(){
  const f=cur;
  switch(step){
    case 0: return step0(f);
    case 1: return step1(f);
    case 2: return step2(f);
    case 3: return step3(f);
    case 4: return step4(f);
    case 5: return step5(f);
    case 6: return step6(f);
    case 7: return step7(f);
    default: return h('div',{},'—');
  }
}

      fld('Présentation (ex: sac 25 kg, bidon 5 L)',i===0,inpP(p,'present',{type:'text',placeholder:'ex: sac 25 kg'},i,'fert')),
      fld('Prix du produit (€ / unité)',i===0,inpP(p,'prix',{type:'number',placeholder:'ex: 15',step:'0.5'},i,'fert')),
      r2(fld('Quantité par arbre et par passage',false,inpP(p,'dose',{type:'text',placeholder:'ex: 5 kg/arbre'},i,'fert')),
         fld('Combien de fois par an ?',false,inpP(p,'freq',{type:'number',placeholder:'ex: 2'},i,'fert'))),
      fld('À quel moment de l\'année ?',false,selWithAutreP(p,'moment','moment_autre',FERTIL_MOMENTS,i,'fert')),
      fld('Temps passé à fertiliser (h/arbre/an)',false,inpP(p,'temps_h',{type:'number',placeholder:'ex: 0.5',step:'0.25'},i,'fert'))

    else{fertProds.push(block);}
  }

  // Phyto products
  const phytoProds=[];
  for(let i=0;i<3;i++){

      fld('Quel équipement pour appliquer ?',false,selWithAutreP(p,'equipt','equipt_autre',EQUIPEMENTS,i,'phyto'))

  }

  return h('div',{},
    // Fertilisation
    card('Est-ce que l\'arbre est fertilisé ?','',
      fld('Fertilisation pratiquée ?',true,radio(f.fertilise,'fertilise',['Oui','Non','NSP'])),

           fld('À quel(s) mois ?',false,inp(f.taille_entr_mois,'taille_entr_mois',{type:'text',placeholder:'ex: Janvier, Juillet'}))),
        r2(fld('Quel outil est utilisé ?',false,selWithAutre(f.taille_entr_outil,f.taille_entr_outil_autre,'taille_entr_outil','taille_entr_outil_autre',TAILLE_OUTILS)),
           fld('Temps passé à tailler (h/arbre/an)',true,inp(f.taille_entr_temps,'taille_entr_temps',{type:'number',placeholder:'ex: 2',step:'0.5'}))),
        fld('Coût si quelqu\'un d\'autre taille (€)',false,inp(f.taille_entr_cout,'taille_entr_cout',{type:'number',placeholder:'ex: 50',step:'5'}))
      ):null

    optSection('Taille de régénération et élagage (optionnel)','tailles',

        f.taille_regen==='Oui'?h('div',{},
          r2(fld('Dernière fois que ça a été fait (année)',false,inp(f.taille_regen_annee,'taille_regen_annee',{type:'number',placeholder:'ex: 2018'})),
             fld('Tous les combien d\'années environ ?',false,inp(f.taille_regen_freq,'taille_regen_freq',{type:'number',placeholder:'ex: 15'}))),
          r2(fld('Quel outil ?',false,selWithAutre(f.taille_regen_outil,f.taille_regen_outil_autre,'taille_regen_outil','taille_regen_outil_autre',TAILLE_OUTILS)),

        f.prest_revend==='Oui'?fld('À qui revend-il ?',false,inp(f.prest_revend_qui,'prest_revend_qui',{type:'text',placeholder:'ex: marché local, bazardier, particuliers…'})):null,

      f.transfo==='Oui'?h('div',{},
        fld('Que fait-on avec les fruits transformés ?',false,selWithAutre(f.transfo_type,f.transfo_type_autre,'transfo_type','transfo_type_autre',TRANSFO_TYPES)),
        fld('Combien de kg de fruits pour faire 1 kg de produit fini ?',false,inp(f.coeff_transfo,'coeff_transfo',{type:'number',placeholder:'ex: 5',step:'0.5'})),
        r2(fld('Prix de vente du produit transformé (€/kg ou €/unité)',false,inp(f.transfo_prix,'transfo_prix',{type:'number',placeholder:'ex: 4',step:'0.5'})),
           fld('Comment est présenté le produit ?',false,selWithAutre(f.transfo_present,f.transfo_present_autre,'transfo_present','transfo_present_autre',['Vrac','Sachet','Bocal','Boîte','Autre'])))
      ):null,
      f.transfo==='Non'?fld('Pourquoi la transformation n\'est-elle pas pratiquée ?',false,selWithAutre(f.transfo_raison,f.transfo_raison_autre,'transfo_raison','transfo_raison_autre',['Pas d\'équipement','Pas de débouché','Pas de temps','Pas intéressé','Autre'])):null
    )
  );
}

// ── BLOC 7 — ÉCONOMIE ─────────────────────────────────────────────────────────
function step6(f){
  const nb=parseFloat(f.nb_arbres)||0;
  const qm=parseFloat(f.qte_moy)||(parseFloat(f.nb_fruits_arbre||0)*parseFloat(f.poids_fruit||0))||0;
  const px=parseFloat(f.prix_moy)||0;
  const pv=(parseInt(f.pct_vendu)||0)/100;
  const ca=Math.round(nb*qm*px*pv);
  return h('div',{},
    h('div',{class:'met-row'},
      h('div',{class:'met'},h('div',{class:'met-l'},'Production moy.'),h('div',{class:'met-v'},qm>0?qm.toFixed(0):'—'),h('div',{class:'met-u'},'kg/arbre/an')),
      h('div',{class:'met'},h('div',{class:'met-l'},'CA estimé'),h('div',{class:'met-v',style:'font-size:16px'},ca>0?ca.toLocaleString('fr-FR'):'—'),h('div',{class:'met-u'},'€/an')),
      h('div',{class:'met'},h('div',{class:'met-l'},'Nb arbres'),h('div',{class:'met-v'},nb||'—'),h('div',{class:'met-u'},'arbres'))
    ),
    infobox('Le CA est calculé automatiquement. Les charges seront calculées après l\'enquête à partir des données des blocs précédents.'),
    card('Main-d\'œuvre','',
      fld('Combien est payée une personne extérieure par jour (€/jour) ?',true,inp(f.cout_mo_j,'cout_mo_j',{type:'number',placeholder:'ex: 80',step:'5'},'Si NSP, laisser vide'))
    ),
    card('Résultats économiques','',
      fld('Ce que rapporte cette production après les dépenses (€/an)',false,inp(f.EBE,'EBE',{type:'number',placeholder:'si le producteur peut estimer',step:'50'})),
      fld('Combien a coûté la mise en place de ces arbres (€) ?',false,inp(f.cout_install,'cout_install',{type:'number',placeholder:'ex: 500',step:'50'}))
    ),
    card('Aides et perspectives','',
      fld('Est-ce que des aides ont été reçues pour cette production ?',false,multisel(f.aides,'aides',AIDES)),
      fld('Montant total des aides (€/an)',false,inp(f.aides_montant,'aides_montant',{type:'number',placeholder:'si connu',step:'50'})),
      fld('Qu\'est-ce que le producteur prévoit de faire ?',true,selWithAutre(f.perspectives,f.perspectives_autre,'perspectives','perspectives_autre',PERSPECTIVES)),
      fld('Pourquoi ?',false,inp(f.perspectives_pourquoi,'perspectives_pourquoi',{type:'text',placeholder:'Raisons de ce choix…'})),
      fld('Est-ce que la production sera transmise à quelqu\'un ?',false,radio(f.transmission,'transmission',['Oui','Non','NSP'])),
      f.transmission==='Oui'?fld('À qui ?',false,inp(f.transmission_qui,'transmission_qui',{type:'text',placeholder:'ex: fils, neveu, jeune installé…'})):null
    )
  );
}

// ── BLOC 8 — SYNTHÈSE ─────────────────────────────────────────────────────────
function step7(f){
  const nb=parseFloat(f.nb_arbres)||0;
  const qm=parseFloat(f.qte_moy)||(parseFloat(f.nb_fruits_arbre||0)*parseFloat(f.poids_fruit||0))||0;
  const px=parseFloat(f.prix_moy)||0;
  const pv=(parseInt(f.pct_vendu)||0)/100;
  const ca=Math.round(nb*qm*px*pv);
  const moisR=Object.entries(f.cal||{}).filter(([,v])=>v==='R').map(([i])=>MOIS[i]).join(', ');
  const SR=(l,v)=>h('div',{class:'sr'},h('span',{class:'sr-l'},l),h('span',{class:'sr-v'},v||'—'));
  return h('div',{},
    h('div',{class:'met-row'},
      h('div',{class:'met'},h('div',{class:'met-l'},'Production moy.'),h('div',{class:'met-v'},qm>0?qm.toFixed(0):'—'),h('div',{class:'met-u'},'kg/arbre/an')),
      h('div',{class:'met'},h('div',{class:'met-l'},'CA estimé total'),h('div',{class:'met-v',style:'font-size:15px'},ca>0?ca.toLocaleString('fr-FR'):'—'),h('div',{class:'met-u'},'€/an')),
      h('div',{class:'met'},h('div',{class:'met-l'},'Nb arbres'),h('div',{class:'met-v'},nb||'—'),h('div',{class:'met-u'},'arbres'))
    ),
    card('Récapitulatif','',
      SR('Numéro de la fiche',f.id_enq),
      SR('Stagiaire',f.stagiaire),
      SR('Commune',f.commune),
      SR('Espèce',(f.espece||'').split(' (')[0]||(f.espece_autre||'')),
      SR('Nb arbres',f.nb_arbres&&f.nb_arbres+' arbre(s)'),
      SR('Phase non productive',f.duree_non_prod&&f.duree_non_prod+' an(s)'),
      SR('Phase productive',f.duree_prod&&f.duree_prod+' an(s)'),
      SR('Fertilisation',f.fertilise),
      SR('Taille d\'entretien',f.taille_entr),
      SR('Traitements phyto',f.phyto_oui),
      SR('Rendement moyen',qm>0&&qm.toFixed(0)+' kg/arbre/an'),
      SR('Mois de récolte',moisR||(f.mois_debut&&f.mois_debut+' → '+f.mois_fin)),
      SR('Campagnes/an',f.nb_campagnes),
      SR('Qui récolte',f.qui_recolte),
      SR('Prix vente moyen',f.prix_moy&&f.prix_moy+' €/kg'),
      SR('% vendu',f.pct_vendu&&f.pct_vendu+'%'),
      SR('% autoconsommé',f.pct_auto&&f.pct_auto+'%'),
      SR('Circuits',f.circuits&&f.circuits.length>0?f.circuits.slice(0,3).join(', ')+(f.circuits.length>3?'…':''):'')
    ),
    card('Notes de l\'enquêteur','',
      fld('Observations, points forts, contraintes, pratiques innovantes',false,ta(f.notes,'notes','Ce que le producteur a partagé en dehors des questions…')),
      fld('Coordonnées GPS',false,inp(f.gps,'gps',{type:'text',placeholder:'14.652, -61.024'})),
      fld('Références photos ou croquis',false,inp(f.photos,'photos',{type:'text',placeholder:'ex: ENQ_001_mangue_001.jpg'}))
    ),
    h('button',{class:'export-btn',style:'margin-top:4px',onclick:exportAll},'⬇ Exporter toutes les fiches (JSON)')
  );
}


window.onload=()=>render();

</script>
</body>
