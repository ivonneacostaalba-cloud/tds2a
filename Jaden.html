<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>TDS2A — Systèmes Diversifiés</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gd:#1565C0;--gm:#1976D2;--gp:#E3F2FD;--gl:#BBDEFB;
  --rd:#C62828;--bg:#EEF1EC;--card:#fff;--bdr:#DDE3DA;
  --txt:#1C1F1A;--mut:#5A6358;--hint:#8A9488;
  --r:12px;--ri:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding-bottom:92px}
.app{max-width:560px;margin:0 auto}
.top{background:var(--gd);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.top-info{flex:1}.top-info h1{font-size:13px;font-weight:600;line-height:1.3}.top-info p{font-size:10px;opacity:.7;margin-top:1px}
.tbtn{background:rgba(255,255,255,.18);border:none;color:#fff;border-radius:7px;padding:6px 11px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.prog{height:3px;background:rgba(255,255,255,.2)}.pf{height:100%;background:#fff;transition:width .3s}
.tabs{display:flex;gap:3px;overflow-x:auto;padding:8px 12px 7px;background:var(--gd);scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:5px 10px;border-radius:18px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:rgba(255,255,255,.14);color:rgba(255,255,255,.6);white-space:nowrap;transition:all .15s}
.tab.active{background:#fff;color:var(--gd)}.tab.done{background:rgba(255,255,255,.28);color:#fff}
.cnt{padding:12px 14px}
.card{background:var(--card);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;border:1px solid var(--bdr);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ct{font-size:10px;font-weight:700;color:var(--mut);margin-bottom:13px;text-transform:uppercase;letter-spacing:.06em}
.f{margin-bottom:13px}.f:last-child{margin-bottom:0}
.f label{display:block;font-size:12px;color:var(--mut);margin-bottom:5px;font-weight:500}
.req{color:var(--rd);margin-left:2px}
.desc{font-size:11px;color:var(--hint);font-style:italic;margin-bottom:6px;line-height:1.4}
.inp,.sel,.ta{width:100%;font-size:15px;padding:10px 12px;border-radius:var(--ri);border:1.5px solid var(--bdr);background:#fff;color:var(--txt);-webkit-appearance:none;font-family:inherit;transition:border-color .15s}
.inp:focus,.sel:focus,.ta:focus{outline:none;border-color:var(--gm)}
.ta{min-height:76px;resize:vertical}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.rg{display:flex;gap:7px;flex-wrap:wrap}
.rb{padding:8px 13px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid var(--bdr);background:#fafafa;color:var(--txt);transition:all .15s}
.rb.on{background:var(--gp);border-color:var(--gm);color:var(--gd)}
.cbg{display:flex;flex-wrap:wrap;gap:7px}
.cb-item{padding:7px 12px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid var(--bdr);background:#fafafa;color:var(--txt);transition:all .15s}
.cb-item.on{background:var(--gp);border-color:var(--gm);color:var(--gd)}
.info{background:var(--gp);border-radius:8px;padding:9px 12px;font-size:12px;color:var(--mut);margin-bottom:11px;display:flex;gap:7px;border-left:3px solid var(--gm);line-height:1.5}
.expand-btn{width:100%;padding:9px 14px;border-radius:8px;border:1.5px dashed var(--bdr);background:transparent;color:var(--gm);font-size:13px;font-weight:600;cursor:pointer;text-align:left;margin-top:8px}
.expand-content{display:none;margin-top:8px;padding:12px;background:#f5f8ff;border-radius:8px;border:1px solid var(--bdr)}
.expand-content.open{display:block}
.cult-hdr{background:var(--gd);color:#fff;border-radius:9px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px}
.slbl{font-size:10px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.05em;margin:12px 0 8px;padding-top:4px;border-top:1px solid var(--bdr)}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:560px;background:#fff;border-top:1px solid var(--bdr);padding:10px 14px;display:flex;gap:9px;z-index:100;box-shadow:0 -2px 8px rgba(0,0,0,.06)}
.nbk{flex:0 0 auto;padding:11px 16px;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;border:1.5px solid var(--bdr);background:#fafafa;color:var(--txt)}
.nnx{flex:1;padding:12px;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;border:none;background:var(--gd);color:#fff}
.nsv{flex:1;padding:12px;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;border:none;background:#1B5E20;color:#fff}
.fc{background:var(--card);border-radius:var(--r);padding:14px 16px;margin-bottom:9px;border:1px solid var(--bdr);cursor:pointer}
.fi{font-weight:700;font-size:15px;color:var(--gd);margin-bottom:3px}
.fe{font-size:12px;color:var(--mut);margin-bottom:8px}
.ft{display:flex;gap:5px;flex-wrap:wrap}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;background:var(--gp);color:var(--gd)}
.badge-n{background:#f0f0f0;color:#555}
.db{background:transparent;border:none;color:#ccc;font-size:18px;cursor:pointer;padding:2px 6px;flex-shrink:0}
.empty{text-align:center;padding:52px 24px}
.empty-icon{font-size:54px;margin-bottom:16px}
.empty-title{font-size:17px;font-weight:700;color:var(--gd);margin-bottom:8px}
.empty-sub{font-size:13px;color:var(--hint);margin-bottom:28px}
.new-btn{background:var(--gd);color:#fff;border:none;border-radius:9px;padding:13px 32px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin-bottom:12px}
.sr{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bg);font-size:13px}
.sr:last-child{border-bottom:none}.sl{color:var(--mut)}.sv{font-weight:600}
.parc-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.parc-table th{background:var(--gd);color:#fff;padding:6px 8px;text-align:left;font-size:11px}
.parc-table td{padding:6px 4px;border-bottom:1px solid var(--bdr)}
.parc-table input{width:100%;font-size:12px;padding:4px 6px;border:1px solid var(--bdr);border-radius:4px;background:#fff}
</style>

// STORAGE
function load(){try{const d=localStorage.getItem(SK);if(d)fiches=JSON.parse(d);}catch{fiches=[];}}
function saveFiches(f){try{localStorage.setItem(SK,JSON.stringify(f));return true;}catch{return false;}}

// DOM HELPERS
function h(tag,attrs,...ch){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==="class")el.className=v;
    else if(k.startsWith("on"))el.addEventListener(k.slice(2),v);
    else el.setAttribute(k,v);
  }
  ch.forEach(c=>{if(c==null)return;el.appendChild(typeof c==="string"?document.createTextNode(c):c);});
  return el;
}
function inp(val,key,attrs,obj){
  const e=h("input",{class:"inp",value:val||"",...attrs});
  e.addEventListener("input",ev=>{if(obj)obj[key]=ev.target.value;else cur[key]=ev.target.value;});
  return e;
}
function sel(val,key,opts,ph,obj){
  const e=h("select",{class:"sel"});
  e.appendChild(h("option",{value:""},ph||"— choisir —"));
  opts.forEach(o=>e.appendChild(h("option",{value:o},o)));
  e.value=val||"";
  e.addEventListener("change",ev=>{if(obj)obj[key]=ev.target.value;else cur[key]=ev.target.value;if(!obj)render();});
  return e;
}
function ta(val,key,ph,obj){
  const e=h("textarea",{class:"ta",placeholder:ph||""});
  e.value=val||"";
  e.addEventListener("input",ev=>{if(obj)obj[key]=ev.target.value;else cur[key]=ev.target.value;});
  return e;
}
function fld(lbl,req,desc,child){
  const parts=[h("label",{},lbl,req?h("span",{class:"req"}," ★"):"")];
  if(desc)parts.push(h("div",{class:"desc"},desc));
  parts.push(child);
  return h("div",{class:"f"},...parts);
}
function crd(ttl,...ch){return h("div",{class:"card"},h("div",{class:"ct"},ttl),...ch.filter(Boolean));}
function row2(...ch){const d=h("div",{class:"r2"});ch.forEach(c=>c&&d.appendChild(c));return d;}
function row3(...ch){const d=h("div",{class:"r3"});ch.forEach(c=>c&&d.appendChild(c));return d;}
function slbl(t){return h("div",{class:"slbl"},t);}
function infobox(msg){return h("div",{class:"info"},h("span",{},"ℹ️ "),msg);}
function radio(val,key,opts,obj,onChange){
  const w=h("div",{class:"rg"});
  opts.forEach(o=>{
    const b=h("button",{class:"rb"+(val===o?" on":"")},o);
    b.addEventListener("click",()=>{if(obj)obj[key]=o;else cur[key]=o;if(onChange)onChange(o);else render();});
    w.appendChild(b);
  });
  return w;
}
function cbg(vals,key,opts,obj){
  const w=h("div",{class:"cbg"});
  opts.forEach(o=>{
    const b=h("div",{class:"cb-item"+(vals.includes(o)?" on":"")},o);
    b.addEventListener("click",()=>{
      const arr=(obj?obj[key]:cur[key])||[];
      if(arr.includes(o)){if(obj)obj[key]=arr.filter(x=>x!==o);else cur[key]=arr.filter(x=>x!==o);}
      else{if(obj)obj[key]=[...arr,o];else cur[key]=[...arr,o];}
      render();
    });
    w.appendChild(b);
  });
  return w;
}
function expand(label,...ch){
  const btn=h("button",{class:"expand-btn"},label);
  const content=h("div",{class:"expand-content"},...ch.filter(Boolean));
  btn.addEventListener("click",()=>content.classList.toggle("open"));
  return h("div",{},btn,content);
}

           fld("Prix haut (€)",false,null,ci(c.prix_haut,"prix_haut",{type:"number",placeholder:"ex: 2.5",step:"0.1"}))),
      fld("Distance de livraison ou de vente (km)",false,null,ci(c.dist_livraison,"dist_livraison",{type:"number",placeholder:"ex: 10",min:"0"})),
      slbl("Après récolte"),
      fld("Que deviennent les résidus de culture ?",false,null,cbg(c.residus||[],"residus",RESIDUS))
    )
  );
}

function s11(){
  const f=cur;
  const culturesNom=f.cultures.filter(c=>c.nom).map(c=>c.nom).join(", ")||"—";
  const SR=(l,v)=>h("div",{class:"sr"},h("span",{class:"sl"},l),h("span",{class:"sv"},v||"—"));
  return h("div",{},
    crd("✅ Récapitulatif",
      SR("Numéro de fiche",f.id_enq),SR("Stagiaire",f.stagiaire),SR("Commune",f.commune),
      SR("Surface totale",f.surf_totale&&f.surf_totale+" ha"),SR("Surface en production",f.surf_prod&&f.surf_prod+" ha"),
      SR("Emploi extérieur",f.emploi_ext),SR("MO externe",f.mo_externe),
      SR("Élevage",f.elevage),SR("Nb parcelles",f.nb_parcelles),
      SR("Cultures renseignées",culturesNom)
    ),
    crd("📝 Notes de l'enquêteur",
      fld("Observations générales, points importants",false,null,ta(f.notes,"notes","Ce que tu as observé sur le terrain, points importants…")),
      row2(fld("Coordonnées GPS",false,null,inp(f.gps,"gps",{placeholder:"ex: 14.652, -61.024"})),
           fld("Références photos",false,null,inp(f.photos,"photos",{placeholder:"ex: ENQ_001_parcelle.jpg"})))
    ),
    h("button",{class:"nsv",style:"width:100%;margin-top:4px",onclick:()=>{
      const blob=new Blob([JSON.stringify(cur,null,2)],{type:"application/json"});
      const a=document.createElement("a");a.href=URL.createObjectURL(blob);
      a.download=(cur.id_enq||"fiche")+"_sysdiv.json";a.click();
    }},"⬇ Exporter cette fiche (JSON)")
  );
}

function renderStep(){
  switch(STEPS[step].id){
    case"s1":return s1();
    case"s2":return s2();
    case"s3":return s3();
    case"s4":return s4();
    case"s5":return s5();
    case"s6":return sCulture(0);
    case"s7":return sCulture(1);
    case"s8":return sCulture(2);
    case"s9":return sCulture(3);
    case"s10":return sCulture(4);
    case"s11":return s11();
  }
}

function render(){
  const app=document.getElementById("app");app.innerHTML="";
  if(view==="list"){renderList(app);return;}
  const top=h("div",{class:"top"},
    h("button",{class:"tbtn",onclick:()=>{view="list";render();}},"← Fiches"),
    h("div",{class:"top-info"},
      h("h1",{},cur.id_enq||"Nouvelle fiche"),
      h("p",{},"Étape "+(step+1)+" / "+STEPS.length+" · "+STEPS[step].l)
    ),
    h("button",{class:"tbtn",onclick:saveCur},"💾 Sauv.")
  );
  app.appendChild(top);
  app.appendChild(h("div",{class:"prog"},h("div",{class:"pf",style:"width:"+((step+1)/STEPS.length*100)+"%"})));
  const tabs=h("div",{class:"tabs"});
  STEPS.forEach((s,i)=>{
    const t=h("div",{class:"tab"+(i===step?" active":done.has(i)?" done":"")},s.ic+" "+s.l);
    t.onclick=()=>{step=i;render();};
    tabs.appendChild(t);
  });
  app.appendChild(tabs);
  const cnt=h("div",{class:"cnt"});
  cnt.appendChild(renderStep());
  if(step===STEPS.length-1&&cur){setTimeout(()=>injectSendButton(cur),50);}
  app.appendChild(cnt);
  const nav=h("div",{class:"nav"});
  if(step>0)nav.appendChild(h("button",{class:"nbk",onclick:()=>{step--;render();window.scrollTo(0,0);}},"← Retour"));
  if(step<STEPS.length-1)nav.appendChild(h("button",{class:"nnx",onclick:()=>{done.add(step);step++;render();window.scrollTo(0,0);}},"Suivant →"));
  else nav.appendChild(h("button",{class:"nsv",onclick:async()=>{saveCur();view="list";render();}},"✓ Enregistrer"));
  app.appendChild(nav);
}

function renderList(app){
  const top=h("div",{class:"top"},
    h("div",{class:"top-info"},
      h("h1",{},"🌿 TDS2A — Systèmes Diversifiés"),
      h("p",{},"Martinique · "+fiches.length+" fiche(s) sauvegardée(s)")
    ),
    fiches.length>0?h("button",{class:"tbtn",onclick:exportAll},"⬇ Tout exporter"):null
  );
  app.appendChild(top);
  const cnt=h("div",{class:"cnt"});
  if(fiches.length===0){
    cnt.appendChild(h("div",{class:"empty"},
      h("div",{class:"empty-icon"},"🌿"),
      h("div",{class:"empty-title"},"Aucune fiche encore"),
      h("div",{class:"empty-sub"},"Commencer la collecte terrain"),
      h("button",{class:"new-btn",onclick:newFiche},"+ Nouvelle fiche exploitation")
    ));
  } else {
    cnt.appendChild(h("button",{class:"new-btn",onclick:newFiche},"+ Nouvelle fiche exploitation"));
    [...fiches].reverse().forEach(f=>{
      const fc=h("div",{class:"fc"},
        h("div",{style:"display:flex;justify-content:space-between;align-items:flex-start"},
          h("div",{style:"flex:1",onclick:()=>openFiche(f.id)},
            h("div",{class:"fi"},f.id_enq||"Sans numéro"),
            h("div",{class:"fe"},f.commune||"Commune non renseignée"),
            h("div",{class:"ft"},
              f.commune?h("span",{class:"badge"},f.commune):null,
              f.stagiaire?h("span",{class:"badge badge-n"},f.stagiaire):null,
              f.date?h("span",{class:"badge badge-n"},f.date):null,
              f.surf_totale?h("span",{class:"badge"},f.surf_totale+" ha"):null
            )
          ),
          h("button",{class:"db",onclick:e=>{e.stopPropagation();deleteFiche(f.id)}},"✕")
        )
      );
      cnt.appendChild(fc);
    });
  }
  app.appendChild(cnt);
}

function newFiche(){cur=blank();step=0;done=new Set();view="form";render();}
function openFiche(id){
  const f=fiches.find(x=>x.id===id);if(!f)return;
  cur=JSON.parse(JSON.stringify(f));
  step=0;done=new Set(STEPS.map((_,i)=>i));view="form";render();
}
function deleteFiche(id){
  if(!confirm("Supprimer cette fiche ?"))return;
  fiches=fiches.filter(f=>f.id!==id);saveFiches(fiches);render();
}
function saveCur(){
  if(!cur)return;
  const u={...cur,saved_at:new Date().toISOString()};
  const i=fiches.findIndex(f=>f.id===u.id);
  if(i>=0)fiches[i]=u;else fiches.push(u);
  saveFiches(fiches);cur=u;
}
function exportAll(){
  const blob=new Blob([JSON.stringify(fiches,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="TDS2A_SysDiversifies_"+today()+".json";a.click();
}

// GOOGLE SHEETS
const APPS_SCRIPT_URL="https://script.google.com/macros/s/AKfycbwmhGf3H-A4A9rPbbAbAK6hLAiVXfkf24hbZjZQeF2JKXc9-lmlHqRAUCZkzg58nClkYA/exec";
async function sendToSheets(fiche){
  const btn=document.getElementById("send-btn");
  const msg=document.getElementById("send-msg");
  if(!btn||!msg)return;
  btn.disabled=true;btn.textContent="⏳ Envoi en cours…";msg.textContent="";
  try{
    await fetch(APPS_SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(fiche)});
    btn.textContent="✓ Envoyé à Google Sheets !";btn.style.background="#2E7D32";
    msg.textContent="✓ Fiche reçue — ID : "+(fiche.id_enq||"?");msg.style.color="#2E7D32";
    const idx=fiches.findIndex(f=>f.id===fiche.id);
    if(idx>=0){fiches[idx].sent_to_sheets=true;saveFiches(fiches);}
  }catch(err){
    btn.textContent="⚠ Erreur — réessayer";btn.disabled=false;btn.style.background="#C62828";
    msg.textContent="Vérifier la connexion internet.";msg.style.color="#C62828";
  }
}
function injectSendButton(fiche){
  const existing=document.getElementById("send-zone");if(existing)existing.remove();
  const zone=document.createElement("div");zone.id="send-zone";zone.style.cssText="margin:12px 14px 4px;";
  const btn=document.createElement("button");btn.id="send-btn";
  const sent=fiche&&fiche.sent_to_sheets;
  btn.textContent=sent?"✓ Déjà envoyé — renvoyer ?":"📤 Envoyer à Google Sheets";
  btn.style.cssText="width:100%;padding:14px;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer;border:none;background:"+(sent?"#2E7D32":"#1565C0")+";color:#fff;font-family:inherit;margin-bottom:8px;display:block;";
  btn.onclick=()=>sendToSheets(fiche);
  const msg=document.createElement("div");msg.id="send-msg";msg.style.cssText="font-size:12px;text-align:center;padding:4px;font-weight:500;min-height:18px;";
  if(sent){msg.textContent="✓ Cette fiche a déjà été envoyée au Google Sheet.";msg.style.color="#2E7D32";}
  zone.appendChild(btn);zone.appendChild(msg);
  const nav=document.querySelector(".nav");if(nav)nav.parentNode.insertBefore(zone,nav);
}

load();render();
</script>
