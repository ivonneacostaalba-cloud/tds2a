<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDS2A — Récupération des données</title>
<style>
  body { font-family: Arial, sans-serif; background: #f0f4f0; color: #222; padding: 16px; max-width: 600px; margin: 0 auto; }
  h1 { color: #2d6a4f; font-size: 18px; }
  .card { background: white; border-radius: 10px; padding: 16px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
  .found { background: #d8f3dc; border-left: 4px solid #2d6a4f; padding: 12px; border-radius: 0 8px 8px 0; margin-bottom: 10px; }
  .not-found { background: #f8d7da; border-left: 4px solid #c0392b; padding: 12px; border-radius: 0 8px 8px 0; }
  .btn { display: block; width: 100%; padding: 14px; border-radius: 9px; border: none; cursor: pointer; font-size: 15px; font-weight: bold; font-family: Arial, sans-serif; margin: 8px 0; text-align: center; }
  .btn-green { background: #2d6a4f; color: white; }
  .btn-orange { background: #c26a1a; color: white; }
  .btn:active { transform: scale(.97); }
  table { border-collapse: collapse; width: 100%; font-size: 11px; margin-top: 10px; }
  th { background: #2d6a4f; color: white; padding: 5px 6px; text-align: left; }
  td { border: 1px solid #ddd; padding: 4px 6px; vertical-align: top; word-break: break-word; }
  tr:nth-child(even) td { background: #f8faf8; }
  #status { font-size: 13px; color: #2d6a4f; margin-top: 8px; font-weight: bold; }
  .badge { display: inline-block; background: #e2e8f0; border-radius: 4px; padding: 1px 6px; font-size: 11px; font-family: monospace; }
</style>
</head>
<body>

<div class="card">
  <h1>TDS2A — Recuperation des donnees</h1>
  <p style="font-size:13px;color:#555;">Cette page cherche toutes les donnees sauvegardees par les formulaires TDS2A dans ce navigateur.</p>
</div>

<div class="card">
  <h2 style="color:#2d6a4f;font-size:15px;margin-top:0;">Resultats</h2>
  <div id="results">Recherche en cours...</div>
</div>

<div class="card" id="export-card" style="display:none;">
  <h2 style="color:#2d6a4f;font-size:15px;margin-top:0;">Exporter</h2>
  <button class="btn btn-green" onclick="exportCSV()">Telecharger CSV (Excel)</button>
  <button class="btn btn-orange" onclick="exportJSON()">Telecharger JSON</button>
  <div id="status"></div>
</div>

<script>
const KEYS = [
  { key: 'tds2a_abp_v1',      label: 'Arbre a Pain v1' },
  { key: 'tds2a_fruitier_v1', label: 'Fruitier v1' },
  { key: 'tds2a_fap_v2',      label: 'Fruit a Pain v2' },
  { key: 'tds2a_fruitier_v2', label: 'Fruitier v2' },
  { key: 'tds2a_fap_v3',      label: 'Fruit a Pain v3' },
  { key: 'tds2a_fruitier_v3', label: 'Fruitier v3' },
  { key: 'idecas_canne_v1',   label: 'IDECAS Canne' },
];

let allFound = {};

function scan() {
  const res = document.getElementById('results');
  let html = '';
  let foundCount = 0;

  // Chercher toutes les clés connues
  KEYS.forEach(({ key, label }) => {
    const raw = localStorage.getItem(key);
    if (raw) {
      foundCount++;
      let data = {};
      try { data = JSON.parse(raw); } catch(e) { data = { raw }; }
      allFound[key] = { label, data };

      const fields = Object.entries(data).filter(([k,v]) => v && v !== '' && v !== 'NSP');
      const id = data.id_enquete || '—';
      const date = data.date_enquete || '—';
      const commune = data.commune || '—';
      const enqueteur = data.enqueteur || '—';

      html += `<div class="found">
        <strong>Trouve : ${label}</strong> <span class="badge">${key}</span><br>
        <small>ID : <b>${id}</b> | Date : <b>${date}</b><br>Commune : <b>${commune}</b> | Enqueteur : <b>${enqueteur}</b></small><br>
        <small>${fields.length} champs renseignes</small>
        <table>
          <tr><th>Champ</th><th>Valeur</th></tr>
          ${fields.slice(0,30).map(([k,v])=>`<tr><td>${k}</td><td>${String(v).substring(0,150)}</td></tr>`).join('')}
          ${fields.length>30?`<tr><td colspan="2" style="color:#999;font-style:italic;">... et ${fields.length-30} autres champs</td></tr>`:''}
        </table>
      </div>`;
    }
  });

  // Chercher d'autres clés inconnues
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && !KEYS.find(x => x.key === k)) {
      const raw = localStorage.getItem(k);
      if (raw && raw.startsWith('{')) {
        foundCount++;
        let data = {};
        try { data = JSON.parse(raw); } catch(e) {}
        allFound[k] = { label: k, data };
        html += `<div class="found" style="background:#fff3cd;border-color:#e9c46a;">
          <strong>Autre cle trouvee :</strong> <span class="badge">${k}</span><br>
          <small>${Object.keys(data).length} champs enregistres</small>
        </div>`;
      }
    }
  }

  if (foundCount === 0) {
    html = `<div class="not-found">
      <strong>Aucune donnee trouvee.</strong><br><br>
      Verifiez que :<br>
      - Vous utilisez bien Safari (le meme navigateur qu'au moment du remplissage)<br>
      - Vous n'avez pas vide votre historique/cache depuis<br>
      - Vous etes bien sur le meme iPhone/iPad
    </div>`;
  } else {
    document.getElementById('export-card').style.display = 'block';
  }

  res.innerHTML = html;
}

function exportCSV() {
  const rows = [['source','cle','champ','valeur']];
  Object.entries(allFound).forEach(([key, { label, data }]) => {
    if (data && typeof data === 'object') {
      Object.entries(data).forEach(([k, v]) => {
        rows.push([label, key, k, String(v).replace(/"/g, '""')]);
      });
    }
  });
  const csv = '\uFEFF' + rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'TDS2A_donnees_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  document.getElementById('status').textContent = 'CSV telecharge ! Envoyez ce fichier a votre superviseur.';
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(allFound, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'TDS2A_donnees_' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  document.getElementById('status').textContent = 'JSON telecharge ! Envoyez ce fichier a votre superviseur.';
}

window.addEventListener('DOMContentLoaded', scan);
</script>
</body>
</html>
